# ─── Entradas ──────────────────────────────────────────────────────────────

# Docker log driver e Fluentd forward protocol
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# HTTP — útil para testes manuais na aula:
#   curl -X POST http://localhost:9880/siem.test \
#        -H 'Content-Type: application/json' \
#        -d '{"message":"login suspeito","src_ip":"10.0.0.99"}'
<source>
  @type http
  port 9880
  bind 0.0.0.0
  <parse>
    @type json
  </parse>
</source>

# ─── Parse dos logs nginx (enviados pelo Docker log driver) ────────────────
# O Docker log driver embala o log numa chave "log"; aqui extraímos o JSON de dentro

<filter csbank.**>
  @type parser
  key_name log
  reserve_data true
  emit_invalid_record_to_error false
  <parse>
    @type json
  </parse>
</filter>

# ─── Enriquecimento comum ──────────────────────────────────────────────────

<filter **>
  @type record_transformer
  <record>
    fluentd_tag ${tag}
    collector_host "#{Socket.gethostname}"
  </record>
</filter>

# ─── Saída → Data Prepper ─────────────────────────────────────────────────

<match **>
  @type http
  endpoint http://data-prepper:2021/log/ingest
  http_method post
  content_type application/json
  json_array true

  <buffer>
    @type memory
    chunk_limit_size 5m
    flush_interval 5s
    retry_type exponential_backoff
    retry_max_interval 30s
    retry_limit 5
  </buffer>

  <format>
    @type json
  </format>
</match>
