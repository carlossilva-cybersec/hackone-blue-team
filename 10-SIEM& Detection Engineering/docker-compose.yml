version: "3.8"

# Fluxo: CSBank (nginx) → Fluentd → Data Prepper → OpenSearch ← Dashboards

services:

  # ─── Banco de dados ────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    environment:
      - cluster.name=${OPENSEARCH_CLUSTER_NAME}
      - node.name=${OPENSEARCH_NODE_NAME}
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - siem-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── Dashboard ─────────────────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: opensearch-dashboards
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT}:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    networks:
      - siem-net
    depends_on:
      opensearch:
        condition: service_healthy

  # ─── Pipeline de dados ─────────────────────────────────────────────────────
  data-prepper:
    image: opensearchproject/data-prepper:2.8.0
    container_name: data-prepper
    environment:
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./config/data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml
      - ./config/data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml
    ports:
      - "${DATA_PREPPER_PORT}:2021"
      - "${DATA_PREPPER_MGMT_PORT}:4900"
    networks:
      - siem-net
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4900/health | grep -q Running"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

volumes:
  opensearch-data:

networks:
  siem-net:
    driver: bridge
