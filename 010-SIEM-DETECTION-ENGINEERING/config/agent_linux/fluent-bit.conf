[SERVICE]
    Flush                     1
    Daemon                    Off
    Log_Level                 info
    Parsers_File              parsers.conf
    HTTP_Server               off
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020
    Storage.path              /var/lib/fluent-bit/storage
    Storage.sync              normal
    Storage.checksum          off
    Storage.backlog.mem_limit 100M

# ==================================================================
# AUDITD
# ==================================================================
[INPUT]
    Name                      tail
    Tag                       linux.audit
    Path                      /var/log/audit/audit.log
    DB                        /var/lib/fluent-bit/audit.db
    Refresh_Interval          5
    Read_from_Head            true
    Mem_Buf_Limit             50MB

# ==================================================================
# APACHE ACCESS
# ==================================================================
[INPUT]
    Name                      tail
    Tag                       linux.apache.access
    Path                      /var/log/apache2/access.log,/var/log/httpd/access_log
    Parser                    apache
    DB                        /var/lib/fluent-bit/apache_access.db
    Refresh_Interval          5
    Read_from_Head            true
    Mem_Buf_Limit             50MB

# ==================================================================
# APACHE ERROR
# ==================================================================
[INPUT]
    Name                      tail
    Tag                       linux.apache.error
    Path                      /var/log/apache2/error.log,/var/log/httpd/error_log
    DB                        /var/lib/fluent-bit/apache_error.db
    Refresh_Interval          5
    Read_from_Head            true
    Mem_Buf_Limit             50MB


# ==================================================================
# AUTH
# ==================================================================
[INPUT]
    Name                      tail
    Tag                       linux.auth
    Path                      /var/log/auth.log
    DB                        /var/lib/fluent-bit/auth.db
    Refresh_Interval          5
    Read_from_Head            true
    Mem_Buf_Limit             50MB



# ==================================================================
# SYSLOG
# ==================================================================
[INPUT]
    Name                      tail
    Tag                       linux.syslog
    Path                      /var/log/syslog,/var/log/messages
    DB                        /var/lib/fluent-bit/syslog.db
    Refresh_Interval          5
    Read_from_Head            true
    Mem_Buf_Limit             50MB

# ==================================================================
# METADADOS
# ==================================================================
[FILTER]
    Name                      modify
    Match                     *
    Add                       agent_type fluent-bit
    Add                       platform linux

[FILTER]
    Name                      record_modifier
    Match                     linux.auth
    Record                    log_source auth

[FILTER]
    Name                      record_modifier
    Match                     linux.audit
    Record                    log_source auditd


[FILTER]
    Name                      record_modifier
    Match                     linux.apache.access
    Record                    log_source apache_access
    Record                    log_source apache_access

[FILTER]
    Name                      record_modifier
    Match                     linux.apache.error
    Record                    log_source apache_error

[FILTER]
    Name                      record_modifier
    Match                     linux.syslog
    Record                    log_source syslog

# ==================================================================
# OUTPUT OPENSEARCH DATA PREPPER
# ==================================================================

[OUTPUT]
    Name                      http
    Match                     *
    Host                      192.168.15.200
    Port                      2021
    URI                       /log/ingest
    Format                    json
    #Compress                  gzip
    #Retry_Limit               False