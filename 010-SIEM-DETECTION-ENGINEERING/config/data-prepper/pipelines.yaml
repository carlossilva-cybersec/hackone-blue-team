log-pipeline:
  source:
    http:
      port: 2021
      health_check_service: true
      request_timeout: 10000

  processor:
    - date:
        from_time_received: true
        destination: "@timestamp"
    - parse_xml:
        source: "message"
        destination: "event"

  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "HackOne@SIEM2024!"
        insecure: true
        index: "siem-logs"
